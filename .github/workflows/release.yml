name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    if: github.repository == 'otcan/orkestr-lite'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Check out frozen source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare immutable image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.title=Orkestr Lite
            org.opencontainers.image.description=Persistent Codex missions from the browser
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and publish Linux AMD64 image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Smoke test the published digest
        env:
          ORKESTR_SMOKE_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: node test/smoke/docker-smoke.mjs

      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
          IMAGE_NAME_WITH_REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          printf '%s\n' \
            "# Orkestr Lite Build Week release" \
            "" \
            "- Tag: \`$RELEASE_TAG\`" \
            "- Source commit: \`$SOURCE_COMMIT\`" \
            "- Linux AMD64 image: \`$IMAGE_NAME_WITH_REGISTRY@$IMAGE_DIGEST\`" \
            "- Provenance: generated by GitHub artifact attestations" \
            "" \
            "The workflow smoke-tested this exact digest after publication. See RELEASE.md at the tagged commit for anonymous pull, clean-start, verification, and post-freeze rules." \
            > "$notes_file"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Orkestr Lite Build Week — $RELEASE_TAG" \
            --notes-file "$notes_file" \
            --verify-tag \
            --latest
