name: Deploy product walkthrough

on:
  push:
    branches:
      - main
    paths:
      - demo.html
      - assets/submission/v0.2/*.png
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build minimal walkthrough site
        shell: bash
        run: |
          set -euo pipefail
          readonly screenshots=(
            chat.png
            desk-report.png
            files.png
            report-complete.png
            setup.png
            timers.png
            whatsapp.png
          )

          install -d _site/assets/submission/v0.2
          install -m 0644 demo.html _site/index.html
          touch _site/.nojekyll

          for screenshot in "${screenshots[@]}"; do
            install -m 0644 \
              "assets/submission/v0.2/${screenshot}" \
              "_site/assets/submission/v0.2/${screenshot}"
          done

          test "$(find _site/assets/submission/v0.2 -type f -name '*.png' | wc -l | tr -d ' ')" = 7

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
