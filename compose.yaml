services:
  orkestr:
    image: "${ORKESTR_IMAGE:-ghcr.io/otcan/orkestr-lite:v0.1.0-build-week}"
    build:
      context: .
      target: final
    ports:
      - "127.0.0.1:3000:3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - orkestr-data:/data
      - orkestr-workspace:/workspace
      - orkestr-codex:/codex
      - orkestr-desk-auth:/run/orkestr-desk-auth:ro
    environment:
      ORKESTR_HOME: /data
      CODEX_HOME: /codex
      ORKESTR_WORKSPACE: /workspace
      ORKESTR_HOST: 0.0.0.0
      ORKESTR_PORT: 3000
      ORKESTR_ADMIN_PASSWORD: "${ORKESTR_ADMIN_PASSWORD:-}"
      ORKESTR_DESK_URL: http://orkestr-desk:3100
      ORKESTR_DESK_VNC_URL: ws://orkestr-desk:6080/websockify
      ORKESTR_DESK_TOKEN_FILE: /run/orkestr-desk-auth/token
      ORKESTR_CODEX_TRANSPORT: "${ORKESTR_CODEX_TRANSPORT:-auto}"
    depends_on:
      orkestr-desk:
        condition: service_healthy
        required: false
    restart: unless-stopped

  orkestr-desk:
    profiles: ["desk"]
    image: "${ORKESTR_DESK_IMAGE:-orkestr-lite-desk:local}"
    platform: linux/amd64
    build:
      context: .
      target: desk-runtime
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    shm_size: "1gb"
    volumes:
      - orkestr-workspace:/workspace
      - orkestr-codex:/codex
      - orkestr-desk-home:/home/orkestr
      - orkestr-desk-auth:/run/orkestr-desk-auth
    environment:
      CODEX_HOME: /codex
      ORKESTR_WORKSPACE: /workspace
      ORKESTR_CODEX_VERSION: 0.144.5
      ORKESTR_DESK_TOKEN_FILE: /run/orkestr-desk-auth/token
    restart: unless-stopped

volumes:
  orkestr-data:
  orkestr-workspace:
  orkestr-codex:
  orkestr-desk-home:
  orkestr-desk-auth:
