services:
  orkestr:
    image: ghcr.io/otcan/orkestr-lite:latest
    build:
      context: .
    ports:
      - "127.0.0.1:3000:3000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - orkestr-data:/data
      - orkestr-workspace:/workspace
    environment:
      ORKESTR_HOME: /data
      CODEX_HOME: /data/codex
      ORKESTR_WORKSPACE: /workspace
      ORKESTR_HOST: 0.0.0.0
      ORKESTR_PORT: 3000
      ORKESTR_ADMIN_PASSWORD: "${ORKESTR_ADMIN_PASSWORD:-}"
    restart: unless-stopped

volumes:
  orkestr-data:
  orkestr-workspace:
